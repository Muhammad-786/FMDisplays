name: Deploy Web App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    name: Validate & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML files
        run: |
          echo "Checking HTML files exist..."
          test -f index.html  && echo "✅ index.html found"  || (echo "❌ index.html missing" && exit 1)
          test -f admin.html  && echo "✅ admin.html found"  || (echo "❌ admin.html missing" && exit 1)
          echo "All required files present."

      - name: Inject Firebase config
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          python3 - <<'EOF'
          import os, re
          cfg = os.environ['FIREBASE_CONFIG']
          for f in ['index.html', 'admin.html']:
              content = open(f).read()
              content = content.replace('__FIREBASE_CONFIG__', cfg)
              open(f, 'w').write(content)
          print('Firebase config injected into index.html and admin.html')
          EOF

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.md,firestore.rules'
